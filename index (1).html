// ── Unit conversion ───────────────────────────────────────────────
function calcUnitPrice(totalPrice, qty, inputUnit, weightBase='jin', pieces=1) {
  if (!totalPrice || !qty) return null;
  const p = parseFloat(totalPrice), q = parseFloat(qty), n = parseFloat(pieces)||1;
  if (isNaN(p)||isNaN(q)||q===0) return null;
  const totalQty = q * n; // e.g. 2桶 × 19L = 38L
  if (['斤','kg','g'].includes(inputUnit)) {
    let perKg = inputUnit==='kg' ? p/totalQty : inputUnit==='斤' ? p/totalQty/0.5 : p/totalQty*1000;
    return weightBase==='kg' ? {unitPrice:perKg,displayUnit:'元/kg'} : {unitPrice:perKg*0.5,displayUnit:'元/斤'};
  }
  if (['L','ml','cc'].includes(inputUnit)) {
    const perL = inputUnit==='L' ? p/totalQty : p/totalQty*1000;
    return {unitPrice:perL,displayUnit:'元/L'};
  }
  return {unitPrice:p/totalQty,displayUnit:`元/${inputUnit}`};
}
function unitPriceDirect(price,unit){
  if(!price)return null;
  const p=parseFloat(price);
  return isNaN(p)?null:{unitPrice:p,displayUnit:`元/${unit}`};
}

// ── Icons ─────────────────────────────────────────────────────────

    Array.isArray(d)?d.map((p,i)=>React.createElement('path',{key:i,d:p})):React.createElement('path',{d})
  );
}
function StarIcon({filled,size=16,color=T.star}){
  return React.createElement('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:filled?color:'none',stroke:color,strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},

  );
}

function useStorage(key,init){
  const[val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}},[key,val]);
  return[val,setVal];
}

function SuggestInput({label,value,onChange,suggestions,placeholder,style}){
  const[open,setOpen]=useState(false);
  const opts=[...new Set(suggestions)].filter(s=>s&&s!==value&&s.toLowerCase().includes((value||'').toLowerCase())).slice(0,5);
  const s={width:'100%',padding:'10px 12px',borderRadius:9,border:`1.5px solid ${T.border}`,boxSizing:'border-box',fontSize:14,background:'#fff',color:T.text,outline:'none',fontFamily:'inherit'};
  return(
    <div style={{position:'relative',...style}}>
      {label&&<div style={{fontSize:12,color:T.sub,marginBottom:4,fontFamily:'sans-serif'}}>{label}</div>}
      <input value={value||''} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),150)} placeholder={placeholder||label} style={s}/>
      {open&&opts.length>0&&(
        <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:`1px solid ${T.border}`,borderRadius:8,zIndex:300,boxShadow:'0 4px 12px rgba(0,0,0,0.12)',overflow:'hidden'}}>
          {opts.map(s=>(
            <div key={s} onMouseDown={()=>{onChange(s);setOpen(false);}} onTouchStart={()=>{onChange(s);setOpen(false);}}
              style={{padding:'10px 12px',fontSize:13,color:T.text,cursor:'pointer',borderBottom:`1px solid ${T.border}`}}>{s}</div>
          ))}
        </div>
      )}
    </div>
  );
}

const mkForm=(cats)=>({
  name:'',cat:cats[0]||'',channel:'',color:DOT_COLORS[0],
  inputMode:'total',
  pieces:'1',           // 件数（新增）
  qty:'',qtyUnit:'斤',
  totalPrice:'',unitPrice:'',unitPriceUnit:'斤',
  spec1:'',spec2:'',spec3:'',note:'',
  starred:false,
});

function App(){
  const[records,setRecords]=useStorage('pr_v7_records',[]);
  const[cats,setCats]=useStorage('pr_v6_cats',DEFAULT_CATS);
  const[weightBase,setWeightBase]=useStorage('pr_v6_wbase','jin');
  const[specLabels,setSpecLabels]=useStorage('pr_v6_specs',DEF_SPEC);
  const[tab,setTab]=useState('list');
  const[form,setForm]=useState(()=>mkForm(DEFAULT_CATS));
  const[editId,setEditId]=useState(null);
  const[showForm,setShowForm]=useState(false);
  const[search,setSearch]=useState('');
  const[filterCat,setFilterCat]=useState('全部');
  const[expanded,setExpanded]=useState({});
  const[newCat,setNewCat]=useState('');
  const[editingSpec,setEditingSpec]=useState(false);
  const[tempSpec,setTempSpec]=useState([...DEF_SPEC]);

  const getUP=r=>r.inputMode==='unit'
    ?unitPriceDirect(r.unitPrice,r.unitPriceUnit)
    :calcUnitPrice(r.totalPrice,r.qty,r.qtyUnit,weightBase,r.pieces||1);

  const hist={
    names:[...new Set(records.map(r=>r.name).filter(Boolean))],
    channels:[...new Set(records.map(r=>r.channel).filter(Boolean))],
    spec1:[...new Set(records.filter(r=>r.cat===form.cat).map(r=>r.spec1).filter(Boolean))],
    spec2:[...new Set(records.filter(r=>r.cat===form.cat).map(r=>r.spec2).filter(Boolean))],
    spec3:[...new Set(records.filter(r=>r.cat===form.cat).map(r=>r.spec3).filter(Boolean))],
  };

  const filtered=records.filter(r=>(filterCat==='全部'||r.cat===filterCat)&&[r.name,r.channel,r.spec1,r.spec2,r.spec3].some(v=>v&&v.includes(search)));
  const groups=filtered.reduce((a,r)=>{(a[r.name]=a[r.name]||[]).push(r);return a;},{});
  const allGroups=records.reduce((a,r)=>{(a[r.name]=a[r.name]||[]).push(r);return a;},{});

  const submit=()=>{
    if(!form.name||!form.channel)return alert('请填写商品名称和渠道');
    if(form.inputMode==='total'&&(!form.qty||!form.totalPrice))return alert('请填写数量和总价');
    if(form.inputMode==='unit'&&!form.unitPrice)return alert('请填写单价');
    const entry={...form,id:editId||Date.now()};
    setRecords(rs=>editId?rs.map(r=>r.id===editId?entry:r):[...rs,entry]);
    setForm(mkForm(cats));setEditId(null);setShowForm(false);
  };
  const doEdit=r=>{setForm({...mkForm(cats),...r,pieces:r.pieces||'1'});setEditId(r.id);setShowForm(true);};
  const doDelete=id=>{if(window.confirm('确定删除？'))setRecords(rs=>rs.filter(r=>r.id!==id));};
  const toggle=name=>setExpanded(e=>({...e,[name]:!e[name]}));
  const closeForm=()=>{setShowForm(false);setEditId(null);setForm(mkForm(cats));};

  // Toggle star: only one starred per product name group
  const toggleStar=id=>{
    setRecords(rs=>{
      const target=rs.find(r=>r.id===id);
      if(!target)return rs;
      const name=target.name;
      const alreadyStarred=target.starred;
      return rs.map(r=>{
        if(r.name===name) return {...r,starred: r.id===id ? !alreadyStarred : false};
        return r;
      });
    });
  };

  const chFreq=records.reduce((a,r)=>{a[r.channel]=(a[r.channel]||0)+1;return a;},{});
  const maxF=Math.max(...Object.values(chFreq),1);
  const catFreq=records.reduce((a,r)=>{a[r.cat]=(a[r.cat]||0)+1;return a;},{});

  // ── Settings ──────────────────────────────────────────────────
  if(tab==='settings') return(
    <div style={{fontFamily:'Georgia,serif',maxWidth:430,margin:'0 auto',background:T.bg,minHeight:'100vh'}}>
      <div style={{background:T.nav,padding:'16px 20px 13px',display:'flex',alignItems:'center',gap:12}}>
        <button onClick={()=>setTab('list')} style={{border:'none',background:'none',cursor:'pointer',padding:0,display:'flex'}}><Icon d={IC.back} size={22} stroke={T.navActive}/></button>
        <div style={{color:'#fff',fontSize:19,fontWeight:700}}>设置</div>
      </div>
      <div style={{padding:'16px 14px'}}>
        <div style={{background:T.card,borderRadius:11,padding:14,border:`1px solid ${T.border}`,marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:12,fontFamily:'sans-serif'}}>自定义分类</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
            {cats.map(c=>(
              <div key={c} style={{display:'flex',alignItems:'center',background:T.soft,borderRadius:20,paddingLeft:12,overflow:'hidden'}}>
                <span style={{fontSize:13,color:T.primary,fontFamily:'sans-serif'}}>{c}</span>
                <button onClick={()=>{if(cats.length<=1){alert('至少保留一个分类');return;}setCats(cs=>cs.filter(x=>x!==c));}} style={{border:'none',background:'none',cursor:'pointer',padding:'8px 10px',display:'flex'}}><Icon d={IC.x} size={13} stroke={T.sub} sw={2}/></button>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}>
            <input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="新分类名称" onKeyDown={e=>{if(e.key==='Enter'&&newCat.trim()){setCats(cs=>[...cs,newCat.trim()]);setNewCat('');}}} style={{...inp,flex:1,padding:'9px 12px'}}/>
            <button onClick={()=>{if(!newCat.trim())return;setCats(cs=>[...cs,newCat.trim()]);setNewCat('');}} style={{padding:'9px 16px',background:T.primary,color:'#fff',border:'none',borderRadius:9,cursor:'pointer',fontFamily:'sans-serif',fontSize:13,fontWeight:600}}>添加</button>
          </div>
        </div>
        <div style={{background:T.card,borderRadius:11,padding:14,border:`1px solid ${T.border}`,marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:10,fontFamily:'sans-serif'}}>重量换算基准单位</div>
          <div style={{display:'flex',gap:8}}>
            {[['jin','元/斤'],['kg','元/kg']].map(([k,l])=>(

          <div style={{fontSize:12,color:T.sub,fontFamily:'sans-serif',marginTop:8}}>容量固定换算为 元/L</div>

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>

            <button onClick={()=>{if(editingSpec){setSpecLabels(tempSpec);}else{setTempSpec([...specLabels]);}setEditingSpec(!editingSpec);}} style={{border:'none',background:editingSpec?T.primary:T.soft,color:editingSpec?'#fff':T.primary,borderRadius:7,padding:'5px 12px',cursor:'pointer',fontSize:12,fontFamily:'sans-serif',fontWeight:600}}>{editingSpec?'保存':'编辑'}</button>
          </div>
          <div style={{display:'flex',gap:8}}>
            {(editingSpec?tempSpec:specLabels).map((f,i)=>editingSpec
              ?<input key={i} value={tempSpec[i]} onChange={e=>setTempSpec(ts=>ts.map((v,j)=>j===i?e.target.value:v))} style={{flex:1,padding:'8px 10px',borderRadius:8,border:`1.5px solid ${T.border}`,fontSize:13,color:T.text,outline:'none',background:'#fff'}}/>
              :<div key={i} style={{flex:1,background:T.soft,borderRadius:8,padding:'7px 10px',fontSize:13,color:T.primary,fontFamily:'sans-serif',textAlign:'center'}}>{f}</div>
            )}
          </div>
          {editingSpec&&<button onClick={()=>setTempSpec([...DEF_SPEC])} style={{border:'none',background:'none',color:T.sub,fontSize:12,fontFamily:'sans-serif',cursor:'pointer',textDecoration:'underline',marginTop:8}}>恢复默认</button>}
        </div>
      </div>
    </div>
  );

  // ── Main ──────────────────────────────────────────────────────
  return(
    <div style={{fontFamily:'Georgia,serif',maxWidth:430,margin:'0 auto',background:T.bg,minHeight:'100vh',display:'flex',flexDirection:'column'}}>

        <div>
          <div style={{color:T.navActive,fontSize:10,letterSpacing:3,fontFamily:'sans-serif',marginBottom:3}}>PRICE TRACKER</div>
          <div style={{color:'#fff',fontSize:21,fontWeight:700}}>省钱雷达</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{textAlign:'right'}}>
            <div style={{color:T.navActive,fontSize:22,fontWeight:700,fontFamily:'sans-serif'}}>{records.length}</div>
            <div style={{color:'#999',fontSize:11,fontFamily:'sans-serif'}}>条记录</div>
          </div>
          <button onClick={()=>setTab('settings')} style={{border:'none',background:'none',cursor:'pointer',padding:4,display:'flex'}}><Icon d={IC.gear} size={22} stroke='#999'/></button>

      <div style={{flex:1,overflowY:'auto',paddingBottom:78}}>

        {tab==='list'&&(

              <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)'}}><Icon d={IC.search} size={16} stroke={T.sub}/></span>
              <input placeholder="搜索商品、渠道或规格" value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,paddingLeft:36,background:T.card}}/>
            </div>
            <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:13}}>
              {['全部',...cats].map(c=>(
                <button key={c} onClick={()=>setFilterCat(c)} style={{padding:'5px 12px',borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontFamily:'sans-serif',background:filterCat===c?T.primary:T.soft,color:filterCat===c?'#fff':T.primary,fontWeight:filterCat===c?600:400}}>{c}</button>
              ))}
            </div>

            {Object.keys(groups).length===0&&(
              <div style={{textAlign:'center',color:T.sub,marginTop:70}}>
                <Icon d={IC.pkg} size={44} stroke={T.border} sw={1}/>
                <div style={{marginTop:14,fontSize:15,fontFamily:'sans-serif'}}>还没有记录</div>
                <div style={{fontSize:12,marginTop:4,color:T.border,fontFamily:'sans-serif'}}>点下方按钮开始添加</div>
              </div>
            )}

            {Object.entries(groups).map(([name,items])=>{
              const ups=items.map(r=>({r,up:getUP(r)}));
              const vups=ups.filter(x=>x.up);
              const sameUnit=vups.length>1&&new Set(vups.map(x=>x.up.displayUnit)).size===1;
              const minUP=sameUnit?Math.min(...vups.map(x=>x.up.unitPrice)):null;
              const avgUP=sameUnit?(vups.reduce((s,x)=>s+x.up.unitPrice,0)/vups.length):null;
              const isExp=expanded[name],hasMulti=items.length>1;
              const starredItem=items.find(r=>r.starred);

              return(
                <div key={name} style={{background:T.card,borderRadius:11,marginBottom:9,overflow:'hidden',border:`1px solid ${T.border}`}}>
                  <div onClick={()=>hasMulti&&toggle(name)} style={{padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:hasMulti?'pointer':'default'}}>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:hasMulti?4:0,flexWrap:'wrap'}}>
                        <span style={{fontWeight:700,fontSize:15,color:T.text}}>{name}</span>
                        {items[0].cat&&<span style={{fontSize:11,color:T.primary,background:T.soft,padding:'1px 7px',borderRadius:9,fontFamily:'sans-serif'}}>{items[0].cat}</span>}
                        {starredItem&&<span style={{fontSize:11,color:T.star,fontFamily:'sans-serif',display:'flex',alignItems:'center',gap:3}}><StarIcon filled size={12}/> {starredItem.channel}</span>}
                      </div>
                      {sameUnit&&(
                        <div style={{fontSize:12,fontFamily:'sans-serif',color:T.sub}}>
                          最低 <span style={{color:T.lowest,fontWeight:600}}>¥{minUP.toFixed(2)}</span>
                          <span style={{margin:'0 4px',color:T.border}}>|</span>
                          均价 <span style={{color:T.sub,fontWeight:600}}>¥{avgUP.toFixed(2)}</span>
                          <span style={{fontSize:11,color:T.sub}}> ({vups[0].up.displayUnit.split('/')[1]})</span>
                        </div>
                      )}
                      {!sameUnit&&hasMulti&&<div style={{fontSize:11,color:T.sub,fontFamily:'sans-serif'}}>单位不同，展开查看详情</div>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      {!hasMulti&&ups[0].up&&<span style={{fontSize:13,color:T.light,fontFamily:'sans-serif'}}>¥{ups[0].up.unitPrice.toFixed(2)}/{ups[0].up.displayUnit.split('/')[1]}</span>}
                      {hasMulti&&<Icon d={isExp?IC.chevU:IC.chevD} size={18} stroke={T.sub}/>}
                    </div>
                  </div>

                  {(isExp||!hasMulti)&&[...ups].sort((a,b)=>(!a.up||!b.up)?0:a.up.unitPrice-b.up.unitPrice).map(({r,up},i)=>{
                    const ss=specStr(r);
                    const isLow=sameUnit&&up&&up.unitPrice===minUP;
                    return(
                      <div key={r.id} style={{display:'flex',alignItems:'center',padding:'9px 14px',borderTop:`1px solid ${T.border}`,gap:8,background:i%2?T.bg:'#fff'}}>
                        <div style={{width:10,height:10,borderRadius:'50%',background:r.color,flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,color:T.text,display:'flex',alignItems:'center',gap:5}}>
                            {r.channel}
                            {r.starred&&<StarIcon filled size={13}/>}
                          </div>
                          {ss&&<div style={{fontSize:11,color:T.light,fontFamily:'sans-serif',marginTop:1}}>{ss}</div>}
                          <div style={{fontSize:11,color:T.sub,fontFamily:'sans-serif',marginTop:1}}>
                            {r.inputMode==='total'
                              ?`${r.pieces&&r.pieces!='1'?r.pieces+'件×':''}${r.qty}${r.qtyUnit} · 共¥${r.totalPrice}`
                              :`单价 ¥${r.unitPrice}/${r.unitPriceUnit}`}
                          </div>
                          {r.note&&<div style={{fontSize:11,color:T.sub,fontFamily:'sans-serif',marginTop:1}}>{r.note}</div>}
                        </div>
                        <div style={{textAlign:'right',flexShrink:0}}>
                          {up&&<div style={{fontWeight:700,fontSize:14,fontFamily:'sans-serif',color:isLow?T.lowest:T.text}}>¥{up.unitPrice.toFixed(2)}</div>}
                          {up&&<div style={{fontSize:10,color:T.sub,fontFamily:'sans-serif'}}>{up.displayUnit}</div>}
                        </div>
                        {/* Star toggle */}
                        <button onClick={()=>toggleStar(r.id)} style={{border:'none',background:'none',cursor:'pointer',padding:'3px 2px',display:'flex',flexShrink:0}}>
                          <StarIcon filled={!!r.starred} size={18}/>
                        </button>
                        <button onClick={()=>doEdit(r)} style={{border:'none',background:'none',cursor:'pointer',padding:3,display:'flex',flexShrink:0}}><Icon d={IC.edit} size={16} stroke={T.sub}/></button>
                        <button onClick={()=>doDelete(r.id)} style={{border:'none',background:'none',cursor:'pointer',padding:3,display:'flex',flexShrink:0}}><Icon d={IC.trash} size={16} stroke={T.sub}/></button>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

        {tab==='stats'&&(
          <div style={{padding:'14px 12px'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:12}}>
              {[[IC.list,'总记录',records.length,'条'],[IC.tag,'商品种类',Object.keys(allGroups).length,'种'],[IC.store,'渠道数',Object.keys(chFreq).length,'个'],[IC.coin,'分类数',cats.length,'个']].map(([ic,l,v,u])=>(
                <div key={l} style={{background:T.card,borderRadius:11,padding:'14px 12px',border:`1px solid ${T.border}`}}>
                  <Icon d={ic} size={20} stroke={T.light} sw={1.5}/>
                  <div style={{fontSize:24,fontWeight:700,color:T.primary,fontFamily:'sans-serif',margin:'8px 0 2px'}}>{v}<span style={{fontSize:12,fontWeight:400,color:T.sub}}> {u}</span></div>
                  <div style={{fontSize:12,color:T.sub,fontFamily:'sans-serif'}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{background:T.card,borderRadius:11,padding:14,border:`1px solid ${T.border}`,marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:12}}><Icon d={IC.store} size={16} stroke={T.primary}/><span style={{fontWeight:700,fontSize:14,color:T.text,fontFamily:'sans-serif'}}>渠道频次</span></div>
              {Object.entries(chFreq).sort((a,b)=>b[1]-a[1]).map(([ch,cnt])=>(
                <div key={ch} style={{marginBottom:9}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4,fontFamily:'sans-serif'}}><span style={{color:T.text}}>{ch}</span><span style={{color:T.sub}}>{cnt} 次</span></div>
                  <div style={{background:T.soft,borderRadius:4,height:7}}><div style={{background:T.primary,borderRadius:4,height:7,width:`${cnt/maxF*100}%`}}/></div>
                </div>
              ))}
              {!Object.keys(chFreq).length&&<div style={{color:T.sub,textAlign:'center',padding:16,fontFamily:'sans-serif',fontSize:13}}>暂无数据</div>}
            </div>
            <div style={{background:T.card,borderRadius:11,padding:14,border:`1px solid ${T.border}`}}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:12}}><Icon d={IC.tag} size={16} stroke={T.primary}/><span style={{fontWeight:700,fontSize:14,color:T.text,fontFamily:'sans-serif'}}>分类分布</span></div>
              <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                {Object.entries(catFreq).sort((a,b)=>b[1]-a[1]).map(([cat,cnt])=>(
                  <div key={cat} style={{background:T.soft,borderRadius:18,padding:'5px 12px',display:'flex',alignItems:'center',gap:5}}>
                    <span style={{fontSize:12,color:T.primary,fontFamily:'sans-serif'}}>{cat}</span>
                    <span style={{fontSize:12,fontWeight:700,color:T.accent,fontFamily:'sans-serif'}}>{cnt}</span>
                  </div>
                ))}
                {!Object.keys(catFreq).length&&<div style={{color:T.sub,fontFamily:'sans-serif',fontSize:13}}>暂无数据</div>}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:T.nav,display:'flex',zIndex:100}}>
        <button onClick={()=>{setTab('list');setShowForm(false);}} style={{flex:1,padding:'12px 0 10px',border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <Icon d={IC.list} size={22} stroke={tab==='list'?T.navActive:'#666'} sw={tab==='list'?2:1.4}/>
          <span style={{fontSize:11,fontFamily:'sans-serif',color:tab==='list'?T.navActive:'#666'}}>记录</span>
        </button>
        <button onClick={()=>{setForm(mkForm(cats));setEditId(null);setShowForm(true);setTab('list');}} style={{flex:1.3,padding:'4px 0 10px',border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
          <div style={{width:50,height:50,borderRadius:'50%',background:T.accent,display:'flex',alignItems:'center',justifyContent:'center',marginTop:-18,boxShadow:'0 4px 14px rgba(192,104,64,0.5)'}}>
            <Icon d={IC.plus} size={26} stroke='#fff' sw={2.2}/>
          </div>
          <span style={{fontSize:11,fontFamily:'sans-serif',color:T.navActive}}>添加</span>
        </button>
        <button onClick={()=>{setTab('stats');setShowForm(false);}} style={{flex:1,padding:'12px 0 10px',border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <Icon d={IC.chart} size={22} stroke={tab==='stats'?T.navActive:'#666'} sw={tab==='stats'?2:1.4}/>
          <span style={{fontSize:11,fontFamily:'sans-serif',color:tab==='stats'?T.navActive:'#666'}}>统计</span>
        </button>
      </div>

      {/* Form Modal */}
      {showForm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'flex-end',zIndex:200}} onClick={e=>e.target===e.currentTarget&&closeForm()}>
          <div style={{background:T.bg,borderRadius:'18px 18px 0 0',padding:'18px 18px 28px',width:'100%',maxWidth:430,boxSizing:'border-box',maxHeight:'92vh',overflowY:'auto',margin:'0 auto'}}>
            <div style={{width:34,height:3,background:T.border,borderRadius:2,margin:'0 auto 16px'}}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <span style={{fontWeight:700,fontSize:17,color:T.text}}>{editId?'编辑记录':'添加记录'}</span>
              <button onClick={closeForm} style={{border:'none',background:T.soft,borderRadius:'50%',width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon d={IC.x} size={14} stroke={T.primary} sw={2}/></button>
            </div>

            <SuggestInput label="商品名称" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} suggestions={hist.names} placeholder="例：桶装水、菠菜" style={{marginBottom:12}}/>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:5,fontFamily:'sans-serif'}}>分类</div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {cats.map(c=><button key={c} onClick={()=>setForm(f=>({...f,cat:c}))} style={{padding:'6px 14px',borderRadius:16,border:'none',cursor:'pointer',fontSize:13,fontFamily:'sans-serif',background:form.cat===c?T.primary:T.soft,color:form.cat===c?'#fff':T.primary,fontWeight:form.cat===c?600:400}}>{c}</button>)}
              </div>
            </div>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:6,fontFamily:'sans-serif'}}>规格（选填）</div>
              <div style={{display:'flex',gap:7}}>
                {[['spec1',hist.spec1],['spec2',hist.spec2],['spec3',hist.spec3]].map(([k,h],i)=>(
                  <SuggestInput key={k} label={specLabels[i]} value={form[k]} onChange={v=>setForm(f=>({...f,[k]:v}))} suggestions={h} style={{flex:1}}/>
                ))}
              </div>
            </div>

            <SuggestInput label="购买渠道" value={form.channel} onChange={v=>setForm(f=>({...f,channel:v}))} suggestions={hist.channels} placeholder="例：全联、京东、家乐福" style={{marginBottom:12}}/>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:6,fontFamily:'sans-serif'}}>价格输入方式</div>
              <div style={{display:'flex',gap:8}}>
                {INPUT_MODES.map(m=><button key={m.key} onClick={()=>setForm(f=>({...f,inputMode:m.key}))} style={{flex:1,padding:'9px',borderRadius:9,border:`1.5px solid ${form.inputMode===m.key?T.primary:T.border}`,background:form.inputMode===m.key?T.soft:'#fff',color:form.inputMode===m.key?T.primary:T.sub,cursor:'pointer',fontFamily:'sans-serif',fontSize:12,fontWeight:form.inputMode===m.key?700:400}}><div>{m.label}</div><div style={{fontSize:10,marginTop:2,color:T.sub}}>{m.hint}</div></button>)}
              </div>
            </div>

            {form.inputMode==='total'&&(
              <div style={{marginBottom:12}}>
                {/* 件数 × 规格 行 */}
                <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'flex-end'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:T.sub,marginBottom:4,fontFamily:'sans-serif'}}>件数</div>
                    <input type="number" placeholder="1" value={form.pieces} onChange={e=>setForm(f=>({...f,pieces:e.target.value}))} style={inp}/>
                  </div>
                  <div style={{fontSize:18,color:T.sub,paddingBottom:10,flexShrink:0}}>×</div>
                  <div style={{flex:1.5}}>
                    <div style={{fontSize:12,color:T.sub,marginBottom:4,fontFamily:'sans-serif'}}>每件数量</div>
                    <input type="number" placeholder="0" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))} style={inp}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:T.sub,marginBottom:4,fontFamily:'sans-serif'}}>单位</div>
                    <select value={form.qtyUnit} onChange={e=>setForm(f=>({...f,qtyUnit:e.target.value}))} style={{...inp,appearance:'none',WebkitAppearance:'none'}}>
                      {ALL_UNITS.map(u=><option key={u}>{u}</option>)}
                    </select>
                  </div>
                </div>
                {/* 总价行 */}
                <div>
                  <div style={{fontSize:12,color:T.sub,marginBottom:4,fontFamily:'sans-serif'}}>总价（元）</div>
                  <input type="number" placeholder="0.00" value={form.totalPrice} onChange={e=>setForm(f=>({...f,totalPrice:e.target.value}))} style={inp}/>
                </div>
              </div>
            )}

            {form.inputMode==='unit'&&(
              <div style={{display:'flex',gap:8,marginBottom:12}}>
                <div style={{flex:2}}><div style={{fontSize:12,color:T.sub,marginBottom:4,fontFamily:'sans-serif'}}>单价（元）</div><input type="number" placeholder="0.00" value={form.unitPrice} onChange={e=>setForm(f=>({...f,unitPrice:e.target.value}))} style={inp}/></div>
                <div style={{flex:1}}><div style={{fontSize:12,color:T.sub,marginBottom:4,fontFamily:'sans-serif'}}>每</div><select value={form.unitPriceUnit} onChange={e=>setForm(f=>({...f,unitPriceUnit:e.target.value}))} style={{...inp,appearance:'none',WebkitAppearance:'none'}}>{ALL_UNITS.map(u=><option key={u}>{u}</option>)}</select></div>
              </div>
            )}

            {previewUP&&(
              <div style={{background:T.soft,borderRadius:9,padding:'9px 14px',marginBottom:12,fontFamily:'sans-serif',fontSize:13,color:T.primary}}>
                换算单价：<strong>¥{previewUP.unitPrice.toFixed(2)} {previewUP.displayUnit}</strong>
                {form.inputMode==='total'&&form.pieces&&parseFloat(form.pieces)>1&&form.qty&&
                  <span style={{color:T.sub,fontSize:12}}> （{form.pieces}件 × {form.qty}{form.qtyUnit} = {(parseFloat(form.pieces)*parseFloat(form.qty)).toFixed(0)}{form.qtyUnit}）</span>
                }
              </div>
            )}

            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:5,fontFamily:'sans-serif'}}>颜色标记</div>
              <div style={{display:'flex',gap:9}}>
                {DOT_COLORS.map(c=><div key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',outline:form.color===c?`2.5px solid ${T.text}`:'2.5px solid transparent',outlineOffset:2}}/>)}
              </div>
            </div>

            <div style={{marginBottom:22}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:4,fontFamily:'sans-serif'}}>备注（选填）</div>
              <input placeholder="例：促销价、会员价…" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={inp}/>
            </div>

            <button onClick={submit} style={{width:'100%',padding:'15px',background:T.primary,color:'#fff',border:'none',borderRadius:11,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'sans-serif',letterSpacing:1}}>{editId?'保存修改':'确认添加'}</button>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
