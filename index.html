<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>比价程序 - 云同步版 v2.9</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    
    <style>
        :root { --bg: #F5EFE6; --nav: #241408; --accent: #7A4F2D; --text: #2E1A0A; --sub: #907060; --border: #E2D0BC; --white: #FFFCF8; --star: #F5A623; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 压缩头部空间 */
        header { background: var(--nav); padding: 30px 20px 10px; color: white; flex-shrink: 0; display: flex; justify-content: space-between; align-items: flex-end; }
        .nav-title { font-size: 20px; font-weight: bold; margin: 0; }
        .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #ccc; margin-right: 4px; }
        .status-dot.online { background: #4caf50; }
        .status-text { font-size: 11px; color: #aaa; }

        /* 大类筛选栏 - 紧凑 */
        .filter-bar { display: flex; gap: 8px; padding: 8px 15px 8px 30px; background: var(--white); border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; flex-shrink: 0; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-tag { padding: 4px 12px; border-radius: 15px; font-size: 12px; color: var(--sub); border: 1px solid var(--border); cursor: pointer; transition: 0.2s; user-select: none; }
        .filter-tag.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: bold; }

        /* 全局搜索框 - 极简迷你版 */
        .search-bar { padding: 6px 15px 6px 30px; background: var(--bg); flex-shrink: 0; }
        .search-bar input { width: 100%; border-radius: 15px; padding: 6px 15px; border: 1px solid var(--border); background: var(--white); outline: none; font-size: 12px; }

        /* 主列表区域 - 左侧留出30px给导航栏 */
        main { flex: 1; overflow-y: auto; padding: 8px 12px 15px 30px; position: relative; } 
        
        /* 左侧 A-Z 悬浮导航栏 */
        .alpha-sidebar {
            position: fixed; left: 0; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; font-size: 10px; text-align: center;
            z-index: 50; width: 24px; font-weight: bold;
            background: rgba(245, 239, 230, 0.85); /* 半透明背景防文字重叠 */
            padding: 10px 0; border-radius: 0 10px 10px 0;
        }
        .alpha-sidebar span { padding: 3px 0; color: #907060; cursor: pointer; user-select: none; }
        .alpha-sidebar span:active { color: var(--accent); transform: scale(1.2); }

        /* 卡片极简排版 */
        .group-card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
        
        /* 左右同行排版 */
        .group-header { padding: 10px 12px; background: #faf4ed; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .group-title { font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 6px; }
        .cat-tag { font-size: 10px; background: #e8e0d5; color: var(--accent); padding: 1px 4px; border-radius: 3px; font-weight: normal; }
        .group-stats { font-size: 11px; color: var(--sub); display: flex; gap: 6px; align-items: center; }
        .stats-highlight { color: #C06840; font-weight: bold; }
        .arrow { font-size: 10px; color: #999; transition: transform 0.3s; margin-left: 4px; }
        .arrow.collapsed { transform: rotate(-90deg); }

        .item-list { transition: all 0.3s ease-in-out; }
        .item-list.hidden { display: none; }
        
        /* 明细紧凑排版 */
        .item-row { padding: 8px 12px; border-bottom: 1px dashed #eee; display: flex; flex-direction: column; gap: 4px; }
        .item-row:last-child { border-bottom: none; }
        .item-row.is-starred { background: #fffcf2; } 
        
        .row-line { display: flex; justify-content: space-between; align-items: center; }
        .channel-name { font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 4px; }
        .star-icon { color: #ccc; font-size: 16px; cursor: pointer; user-select: none; }
        .star-icon.active { color: var(--star); }
        .unit-price { font-size: 15px; font-weight: bold; color: var(--accent); }
        .sub-text { font-size: 11px; color: var(--sub); }
        .remark-text { font-size: 10px; color: #a88a78; background: #fdfaf7; padding: 2px 4px; border-radius: 3px; display: inline-block; border: 1px solid #f0e6da; }
        .edit-btn { color: #4A7A50; font-size: 11px; padding: 3px 8px; background: #e8f0e9; border-radius: 4px; border: none; cursor: pointer; }

        footer { padding: 10px 15px 20px; background: var(--bg); border-top: 1px solid var(--border); flex-shrink: 0; }
        .add-btn { background: var(--accent); color: white; width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: bold; border: none; cursor: pointer;}
        
        /* 弹窗保持不变 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .form-card { background: var(--white); width: 92%; max-width: 400px; padding: 20px; border-radius: 12px; max-height: 90vh; overflow-y: auto;}
        input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 14px; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-group button { flex: 1; padding: 12px; border-radius: 6px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-del-record { background: #fff1f0; color: #d9363e; margin-top: 15px; width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ffccc7; font-weight: bold; display: none; cursor: pointer;}
    </style>
</head>
<body>

<header>
    <div class="nav-title">比价程序</div>
    <div>
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText" class="status-text">正在连接云端...</span>
    </div>
</header>

<div class="filter-bar" id="filterBar"></div>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 搜索 (支持拼音首字母)" oninput="applyFilterAndRender()">
</div>

<div class="alpha-sidebar" id="alphaSidebar"></div>

<main id="recordList"></main>

<footer>
    <button class="add-btn" onclick="openModal()">＋ 新增购买记录</button>
</footer>

<div class="modal" id="formModal">
    <div class="form-card">
        <div id="modalTitle" style="font-weight:bold; margin-bottom:15px; font-size:16px; border-left:4px solid var(--accent); padding-left:8px;">新增购买</div>
        
        <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input type="text" id="f-category" placeholder="大类 (如: 食品)" list="cat-list" style="flex:1; margin-bottom:0;">
            <datalist id="cat-list"></datalist>

            <input type="text" id="f-name" placeholder="名称 (如: 桶装水)" oninput="updateSuggestions()" list="name-list" style="flex:2; margin-bottom:0;">
            <datalist id="name-list"></datalist>
        </div>

        <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input type="text" id="f-brand" placeholder="品牌 (选填)" list="brand-list" style="flex:1; margin-bottom:0;">
            <datalist id="brand-list"></datalist>
            
            <input type="text" id="f-model" placeholder="型号 (选填)" list="model-list" style="flex:1; margin-bottom:0;">
            <datalist id="model-list"></datalist>
        </div>
        
        <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input type="number" id="f-specNum" placeholder="容量" style="flex:2; margin-bottom:0;">
            <select id="f-specUnit" style="flex:1; margin-bottom:0;">
                <option value="L">L</option><option value="ml">ml</option>
                <option value="kg">kg</option><option value="g">g</option>
                <option value="mm">mm</option><option value="件">件</option>
            </select>
        </div>

        <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input type="number" id="f-totalPrice" placeholder="总额" style="flex:2; margin-bottom:0;">
            <input type="number" id="f-qty" placeholder="数" value="1" style="flex:1; margin-bottom:0;">
            <input type="text" id="f-packageUnit" placeholder="单位" value="件" style="flex:1; margin-bottom:0;" list="pkg-list">
            <datalist id="pkg-list"><option value="件"><option value="桶"><option value="箱"><option value="盒"><option value="提"><option value="包"></datalist>
        </div>
        
        <input type="text" id="f-channel" placeholder="购买渠道 (如: 闪购)" list="channel-list">
        <datalist id="channel-list"></datalist>

        <input type="text" id="f-remark" placeholder="备注 (选填)" style="background:#fffcf2;">
        
        <div class="btn-group">
            <button style="background:#eee; color:#666;" onclick="closeModal()">取消</button>
            <button style="background:var(--accent); color:white;" onclick="handleSave()">保存</button>
        </div>
        
        <button id="btn-delete" class="btn-del-record" onclick="deleteRecord()">删除</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://csktstukwmuitvsjjzwd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNza3RzdHVrd211aXR2c2pqendkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTcwNzYsImV4cCI6MjA5MDQzMzA3Nn0.fc-7q3Xmr1MtZR_NdiIxQ4f3QtbtLn_T1smJM8_INlE';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const GROUP_ID = 'my_family_2026';
    const { pinyin } = pinyinPro;

    let allRecords = []; 
    let currentEditId = null; 
    let collapsedGroups = {};
    let currentCategoryFilter = '全部'; 

    async function fetchRecords() {
        try {
            const { data, error } = await _supabase.from('records').select('*').eq('group_id', GROUP_ID).order('created_at', { ascending: false });
            if (error) throw error;
            allRecords = data;
            document.getElementById('statusDot').classList.add('online');
            document.getElementById('statusText').innerText = `已连云端 (${data.length})`;
            updateNameList(); 
            renderFilterBar();
            applyFilterAndRender();
        } catch (err) {
            document.getElementById('statusText').innerText = '连接失败';
        }
    }

    function renderFilterBar() {
        const filterEl = document.getElementById('filterBar');
        const categories = [...new Set(allRecords.map(r => r.category).filter(c => c))];
        categories.unshift('全部'); 
        if (!categories.includes(currentCategoryFilter)) currentCategoryFilter = '全部';
        filterEl.innerHTML = categories.map(cat => `<div class="filter-tag ${cat === currentCategoryFilter ? 'active' : ''}" onclick="setFilter('${cat}')">${cat}</div>`).join('');
    }

    function setFilter(catName) {
        currentCategoryFilter = catName;
        renderFilterBar(); applyFilterAndRender(); 
    }

    function applyFilterAndRender() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        
        let filteredData = allRecords;
        if (currentCategoryFilter !== '全部') filteredData = filteredData.filter(r => r.category === currentCategoryFilter);
        if (keyword) {
            filteredData = filteredData.filter(r => 
                (r.name && r.name.toLowerCase().includes(keyword)) || 
                (r.brand && r.brand.toLowerCase().includes(keyword)) ||
                (r.model && r.model.toLowerCase().includes(keyword))
            );
        }

        const nameGroups = {};
        filteredData.forEach(item => {
            if (!nameGroups[item.name]) nameGroups[item.name] = [];
            nameGroups[item.name].push(item);
        });
        
        const alphaMap = {};
        Object.keys(nameGroups).forEach(name => {
            let letter = '#';
            if (name) {
                const py = pinyin(name[0], { pattern: 'first', toneType: 'none' });
                if (/^[a-zA-Z]$/.test(py)) letter = py.toUpperCase();
            }
            if (!alphaMap[letter]) alphaMap[letter] = [];
            alphaMap[letter].push({ name, items: nameGroups[name] });
        });

        const sortedLetters = Object.keys(alphaMap).sort((a, b) => {
            if (a === '#') return 1; if (b === '#') return -1;
            return a.localeCompare(b);
        });

        renderUI(alphaMap, sortedLetters);
    }

    function renderUI(alphaMap, sortedLetters) {
        const listEl = document.getElementById('recordList');
        const sidebarEl = document.getElementById('alphaSidebar');
        
        if (sortedLetters.length === 0) {
            listEl.innerHTML = `<div style="text-align:center; color:#999; margin-top:50px;">暂无记录</div>`;
            sidebarEl.innerHTML = ''; return;
        }

        let html = ''; let sidebarHtml = '';

        for (const letter of sortedLetters) {
            sidebarHtml += `<span onclick="scrollToLetter('${letter}')">${letter}</span>`;
            const groupsInLetter = alphaMap[letter].sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
            let isFirstGroupInLetter = true;

            for (const group of groupsInLetter) {
                const name = group.name; const items = group.items;
                items.sort((a, b) => {
                    const modelA = a.model || ''; const modelB = b.model || '';
                    if (modelA !== modelB) return modelA.localeCompare(modelB);
                    const brandA = a.brand || ''; const brandB = b.brand || '';
                    if (brandA !== brandB) return brandA.localeCompare(brandB);
                    const specA = parseFloat((a.specs || '0').match(/([0-9.]+)/)?.[1] || 0);
                    const specB = parseFloat((b.specs || '0').match(/([0-9.]+)/)?.[1] || 0);
                    return specA - specB;
                });

                const minPrice = Math.min(...items.map(i => i.unit_price)).toFixed(2);
                const avgPrice = (items.reduce((sum, i) => sum + i.unit_price, 0) / items.length).toFixed(2);
                const unit = items[0].unit_label || '件';
                const categoryTag = (items[0].category && currentCategoryFilter === '全部') ? `<span class="cat-tag">${items[0].category}</span>` : '';
                const isCollapsed = collapsedGroups[name] ? 'collapsed' : '';
                const listHidden = collapsedGroups[name] ? 'hidden' : '';
                
                // 将对应首字母的锚点藏在第一个卡片里，干掉独立的大字母标题行
                const anchorId = isFirstGroupInLetter ? `id="letter-${letter}"` : '';
                isFirstGroupInLetter = false;

                html += `
                <div class="group-card" ${anchorId}>
                    <div class="group-header" onclick="toggleGroup('${name}')">
                        <div class="group-title">${categoryTag} ${name} <span style="font-size:11px; color:#999;">(${items.length})</span></div>
                        <div class="group-stats">
                            <span>低:<span class="stats-highlight">¥${minPrice}</span> / 均:¥${avgPrice}</span>
                            <div class="arrow ${isCollapsed}">▼</div>
                        </div>
                    </div>
                    <div class="item-list ${listHidden}">`;
                    
                items.forEach(item => {
                    const starActive = item.is_starred ? 'active' : '';
                    const remarkHtml = item.remark ? `<div class="remark-text">📝 ${item.remark}</div>` : '';
                    const modelStr = item.model ? `型号: ${item.model} ` : '';
                    
                    html += `
                        <div class="item-row ${item.is_starred ? 'is-starred' : ''}">
                            <div class="row-line">
                                <div class="channel-name">
                                    <span class="star-icon ${starActive}" onclick="toggleStar(${item.id}, ${item.is_starred}); event.stopPropagation();">★</span>
                                    ${item.channel || '未知渠道'}
                                </div>
                                <div class="unit-price">¥${item.unit_price} <span style="font-size:11px; color:#999;">/${item.unit_label || '件'}</span></div>
                            </div>
                            <div class="row-line" style="margin-top:2px;">
                                <div class="sub-text">品牌: ${item.brand || '-'} | ${modelStr}| 规格: ${item.specs || '-'}</div>
                            </div>
                            <div class="row-line" style="margin-top:2px;">
                                <div style="display:flex; align-items:center; gap:6px;">
                                    <span class="sub-text">总¥${item.total_price} (${item.qty || 1}${item.package_unit || '件'})</span>
                                    ${remarkHtml}
                                </div>
                                <button class="edit-btn" onclick="openEdit(${item.id})">编辑</button>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
            }
        }
        listEl.innerHTML = html;
        sidebarEl.innerHTML = sidebarHtml;
    }

    function scrollToLetter(letter) {
        const el = document.getElementById(`letter-${letter}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function updateNameList() {
        document.getElementById('name-list').innerHTML = [...new Set(allRecords.map(r => r.name).filter(n => n))].map(n => `<option value="${n}">`).join('');
        document.getElementById('channel-list').innerHTML = [...new Set(allRecords.map(r => r.channel).filter(c => c))].map(c => `<option value="${c}">`).join('');
        document.getElementById('cat-list').innerHTML = [...new Set(allRecords.map(r => r.category).filter(c => c))].map(c => `<option value="${c}">`).join('');
    }

    function updateSuggestions() {
        const currentName = document.getElementById('f-name').value.trim();
        const brandList = document.getElementById('brand-list'); const modelList = document.getElementById('model-list');
        brandList.innerHTML = ''; modelList.innerHTML = '';
        if (!currentName) return;

        const matchRecord = allRecords.find(r => r.name === currentName);
        if (matchRecord) {
            if (!document.getElementById('f-category').value) document.getElementById('f-category').value = matchRecord.category || '';
            if (matchRecord.unit_label) document.getElementById('f-specUnit').value = matchRecord.unit_label;
            if (matchRecord.package_unit) document.getElementById('f-packageUnit').value = matchRecord.package_unit;
        }
        const brands = new Set(); const models = new Set();
        allRecords.forEach(r => {
            if (r.name === currentName) { if (r.brand) brands.add(r.brand); if (r.model) models.add(r.model); }
        });
        brands.forEach(b => brandList.innerHTML += `<option value="${b}">`);
        models.forEach(m => modelList.innerHTML += `<option value="${m}">`);
    }

    function toggleGroup(name) { collapsedGroups[name] = !collapsedGroups[name]; applyFilterAndRender(); }

    async function toggleStar(id, currentState) {
        await _supabase.from('records').update({ is_starred: !currentState }).eq('id', id);
    }

    function openModal() {
        currentEditId = null; document.getElementById('modalTitle').innerText = '新增购买';
        document.querySelectorAll('.form-card input').forEach(input => input.value = '');
        document.getElementById('f-qty').value = '1'; document.getElementById('f-specUnit').value = 'L'; document.getElementById('f-packageUnit').value = '件'; 
        document.getElementById('btn-delete').style.display = 'none'; 
        if (currentCategoryFilter !== '全部') document.getElementById('f-category').value = currentCategoryFilter;
        updateSuggestions(); document.getElementById('formModal').classList.add('active');
    }

    function openEdit(id) {
        currentEditId = id; const item = allRecords.find(r => r.id === id); if(!item) return;
        document.getElementById('modalTitle').innerText = '修改记录';
        ['category', 'name', 'brand', 'model', 'channel', 'remark'].forEach(k => document.getElementById(`f-${k}`).value = item[k] || '');
        document.getElementById('f-totalPrice').value = item.total_price;
        document.getElementById('f-packageUnit').value = item.package_unit || '件'; 
        document.getElementById('f-specNum').value = item.specs ? parseFloat(item.specs.match(/([0-9.]+)/)?.[1]) || 1 : 1;
        document.getElementById('f-qty').value = item.qty || 1;
        document.getElementById('f-specUnit').value = item.unit_label || '件';
        updateSuggestions(); document.getElementById('btn-delete').style.display = 'block'; document.getElementById('formModal').classList.add('active');
    }

    function closeModal() { document.getElementById('formModal').classList.remove('active'); }

    async function handleSave() {
        const name = document.getElementById('f-name').value;
        const total = parseFloat(document.getElementById('f-totalPrice').value);
        if (!name || isNaN(total)) return alert('名称和总价必填哦！');
        const qty = parseInt(document.getElementById('f-qty').value) || 1;
        const specNum = parseFloat(document.getElementById('f-specNum').value) || 1;
        const recordData = {
            category: document.getElementById('f-category').value, name, brand: document.getElementById('f-brand').value,
            model: document.getElementById('f-model').value, specs: `${specNum}${document.getElementById('f-specUnit').value}`,
            total_price: total, unit_price: parseFloat((total / (qty * specNum)).toFixed(2)), unit_label: document.getElementById('f-specUnit').value,
            channel: document.getElementById('f-channel').value, remark: document.getElementById('f-remark').value,
            qty, package_unit: document.getElementById('f-packageUnit').value || '件', group_id: GROUP_ID
        };
        if (currentEditId) await _supabase.from('records').update(recordData).eq('id', currentEditId);
        else await _supabase.from('records').insert([recordData]);
        closeModal(); fetchRecords(); 
    }

    async function deleteRecord() {
        if (!currentEditId || !confirm('确定永久删除？')) return;
        await _supabase.from('records').delete().eq('id', currentEditId); closeModal(); fetchRecords();
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetchRecords(); _supabase.channel('any').on('postgres_changes', { event: '*', table: 'records' }, fetchRecords).subscribe();
    });
</script>
</body>
</html>
